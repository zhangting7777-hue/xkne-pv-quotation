    <div class="total-line"><span class="tl">增值税 <input type="number" id="t_vat" value="9" min="0" max="13" step="1" style="width:36px;height:18px;font-size:11px;padding:0 4px;border:0.5px solid var(--color-border-tertiary);border-radius:3px;display:inline;margin:0 2px" oninput="render()">%</span><span class="tv" id="t_vat_amt">—</span></div>
    <div class="total-line"><span class="tl">利润 <input type="number" id="t_prf" value="5" min="0" max="30" step="0.5" style="width:36px;height:18px;font-size:11px;padding:0 4px;border:0.5px solid var(--color-border-tertiary);border-radius:3px;display:inline;margin:0 2px" oninput="render()">%</span><span class="tv" id="t_prf_amt">—</span></div>

<script>
const SECTIONS=[
  {key:'equipment',label:'一、光伏核心设备',items:[
    {name:'高效TopCon N型组件（645W双面双玻）',up:0.83,brand:'晶科Tiger Neo'},
    {name:'并网逆变器（组串式）',up:0.15,brand:'华为SUN2000-150K'},
    {name:'光伏支架及夹具',up:0.99,brand:'锌铝镁'},
  ]},
  {key:'electrical',label:'二、电气系统设备',items:[
    {name:'并网柜和反孤岛柜',up:0.05,brand:'川泉/正泰'},
    {name:'直流线缆 PV1-F-4铜',up:0.06,brand:'玖开、上上'},
    {name:'逆变器交流电缆 3×95+1×50',up:0.21,brand:'玖开、上上'},
    {name:'T接交流电缆 3×240+1×120',up:0.08,brand:'玖开、上上'},
    {name:'线缆桥架（锌铝镁）',up:0.015,brand:''},
    {name:'安装辅材（接地、线管等）',up:0.02,brand:''},
  ]},
  {key:'monitor',label:'三、监控与智能系统',items:[
    {name:'通讯调度设备（群调群控）',up:0.042,brand:'>400kW必配'},
    {name:'谐波治理装置',up:0.03,brand:''},
  ]},
  {key:'om',label:'四、运维设施',items:[
    {name:'运维检修通道及PE管',up:0.01,brand:'含喷淋清洗'},
    {name:'组件积灰导水装置（304不锈钢）',up:0.005,brand:''},
  ]},
  {key:'service',label:'五、施工与设计服务',items:[
    {name:'光伏安装施工（含吊装、接线）',up:0.27,brand:''},
    {name:'电力申请及并网验收',up:0.01,brand:''},
    {name:'现场勘查及施工图设计',up:0.02,brand:''},
    {name:'施工责任一切险',up:0.015,brand:''},
    {name:'建设工程设计费',up:0.02,brand:''},
  ]},
];

let state={sections:JSON.parse(JSON.stringify(SECTIONS))};

function gv(id){return document.getElementById(id)?.value||''}
function gn(id){return parseFloat(document.getElementById(id)?.value)||0}
function fmt(n){return '¥'+Math.round(n).toLocaleString('zh-CN')}
function fmtW(n){return n.toFixed(3)}

function buildItemsArea(){
  const area=document.getElementById('items-area');
  area.innerHTML='';
  state.sections.forEach((sec,si)=>{
    const hdr=document.createElement('div');
    hdr.className='section-hdr';
    hdr.innerHTML=`<span class="sec-label">${sec.label}</span><button class="add-btn" onclick="addItem(${si})"><i class="ti ti-plus" style="font-size:11px" aria-hidden="true"></i> 增加行</button>`;
    area.appendChild(hdr);
    const cols=document.createElement('div');
    cols.className='col-heads';
    cols.innerHTML='<span>名称</span><span>单价(元/W)</span><span>品牌备注</span><span></span>';
    area.appendChild(cols);
    sec.items.forEach((it,ii)=>{
      const row=document.createElement('div');
      row.className='item-row';
      row.innerHTML=`
        <input value="${it.name}" placeholder="项目名称" oninput="updateItem(${si},${ii},'name',this.value)">
        <input type="number" value="${it.up}" step="0.001" min="0" style="text-align:right" oninput="updateItem(${si},${ii},'up',parseFloat(this.value)||0)">
        <input value="${it.brand||''}" placeholder="品牌/备注" oninput="updateItem(${si},${ii},'brand',this.value)">
        <button class="del-btn" onclick="delItem(${si},${ii})" aria-label="删除此行">×</button>`;
      area.appendChild(row);
    });
  });
}

function addItem(si){
  state.sections[si].items.push({name:'新增项目',up:0,brand:''});
  buildItemsArea();render();
}
function delItem(si,ii){
  if(state.sections[si].items.length<=1)return;
  state.sections[si].items.splice(ii,1);
  buildItemsArea();render();
}
function updateItem(si,ii,key,val){
  state.sections[si].items[ii][key]=val;
  render();
}

function calcAll(){
  const cap=gn('f_cap')||240;
  const w=cap*1000;
  const mgt=gn('t_mgt')/100;
  const vat=gn('t_vat')/100;
  const prf=gn('t_prf')/100;
  let secTotals=[];
  let direct=0;
  state.sections.forEach(sec=>{
    let s=0;
    sec.items.forEach(it=>{s+=it.up*w});
    secTotals.push(s);direct+=s;
  });
  const mgtAmt=direct*mgt;
  const vatAmt=direct*vat;
  const prfAmt=direct*prf;
  const grand=direct+mgtAmt+vatAmt+prfAmt;
  const unitW=grand/w;
  const annGen=cap*gn('f_hrs')*(0.82);
  const selfRev=annGen*gn('f_ratio')*gn('f_selfp');
  const gridRev=annGen*(1-gn('f_ratio'))*gn('f_tariff');
  const annRev=selfRev+gridRev;
  const pb=annRev>0?grand/annRev:0;
  const cum25=annRev*25*(1-0.005*12.5);
  return{cap,w,secTotals,direct,mgtAmt,vatAmt,prfAmt,grand,unitW,annGen,annRev,pb,cum25,mgt,vat,prf,selfRev,gridRev};
}

function updateTotals(d){
  document.getElementById('t_direct').textContent=fmt(d.direct);
  document.getElementById('t_mgt_amt').textContent=fmt(d.mgtAmt);
  document.getElementById('t_vat_amt').textContent=fmt(d.vatAmt);
  document.getElementById('t_prf_amt').textContent=fmt(d.prfAmt);
  document.getElementById('t_grand').textContent=fmt(d.grand);
  document.getElementById('t_unit').textContent='综合单价 '+fmtW(d.unitW)+' 元/W';
  document.getElementById('t_payback').textContent='回收期 '+d.pb.toFixed(1)+' 年';
}

function buildDoc(d){
  const owner=gv('f_owner')||'客户单位';
  const addr=gv('f_addr');
  const qno=gv('f_qno');
  const mode=gv('f_mode');
  const modeLabel=mode==='emc'?'EMC能源管理模式（我司投资）优惠报价':'EPC总承包报价';
  const contact=gv('f_contact');
  const phone=gv('f_phone');
  const isEMC=mode==='emc';
  const today=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});

  let detailRows='';
  state.sections.forEach((sec,si)=>{
    detailRows+=`<tr class="mod-row"><td colspan="4">${sec.label}</td></tr>`;
    sec.items.forEach(it=>{
      const amt=it.up*d.w;
      detailRows+=`<tr><td style="padding-left:14px">${it.name}</td><td>${it.brand||'—'}</td><td style="text-align:right">${fmtW(it.up)}</td><td style="text-align:right">¥${Math.round(amt).toLocaleString()}</td></tr>`;
    });
    detailRows+=`<tr class="sub-row"><td colspan="2">小计</td><td></td><td style="text-align:right">¥${Math.round(d.secTotals[si]).toLocaleString()}</td></tr>`;
  });
  detailRows+=`<tr><td>管理费（${(d.mgt*100).toFixed(0)}%）</td><td colspan="2"></td><td style="text-align:right">¥${Math.round(d.mgtAmt).toLocaleString()}</td></tr>`;
  detailRows+=`<tr><td>增值税（${(d.vat*100).toFixed(0)}%专票）</td><td colspan="2"></td><td style="text-align:right">¥${Math.round(d.vatAmt).toLocaleString()}</td></tr>`;
  detailRows+=`<tr><td>目标利润（${(d.prf*100).toFixed(0)}%）</td><td colspan="2"></td><td style="text-align:right">¥${Math.round(d.prfAmt).toLocaleString()}</td></tr>`;
  detailRows+=`<tr class="grand-row"><td colspan="2">项目总报价</td><td style="text-align:right">${fmtW(d.unitW)} 元/W</td><td style="text-align:right">¥${Math.round(d.grand).toLocaleString()}</td></tr>`;

  const pcts=[50,70,100];
  let effRows='';
  pcts.forEach(p=>{
    const gen=(d.cap*gn('f_hrs')*0.82*p/100/10000).toFixed(2);
    const selfR=(d.cap*gn('f_hrs')*0.82*(p/100)*Math.min(gn('f_ratio'),p/100)*gn('f_selfp')/10000).toFixed(1);
    const gridR=(d.cap*gn('f_hrs')*0.82*(p/100)*Math.max(0,p/100-gn('f_ratio'))*gn('f_tariff')/10000).toFixed(1);
    const rev=(parseFloat(selfR)+parseFloat(gridR)).toFixed(1);
    effRows+=`<tr><td>${p}%</td><td>${gen}</td><td>${rev}</td></tr>`;
  });
  const cum25w=(d.cum25/10000).toFixed(1);
  effRows+=`<tr class="hi-row"><td>平均消纳80%，25年总收益（万元）</td><td colspan="2">${cum25w}</td></tr>`;

  const priceNote=isEMC
